name: Publish Understand-Anything Dashboard

# Publishes the interactive knowledge-graph dashboard to GitHub Pages at the
# /understand/ subpath, so it lives ALONGSIDE the marketing prototype already
# served from the gh-pages branch root (this repo's Pages site is one site;
# we do not take that page over). The job builds the static dashboard from the
# pinned Understand-Anything tool, injects this repo's knowledge-graph.json +
# meta.json, and writes ONLY the gh-pages/understand/ subdirectory.
#
#   prototype  -> https://wicked-evolutions.github.io/Mycelium-for-Obsidian/
#   dashboard  -> https://wicked-evolutions.github.io/Mycelium-for-Obsidian/understand/

on:
  push:
    branches: [main]
    paths:
      - ".understand-anything/knowledge-graph.json"
      - ".understand-anything/meta.json"
      - ".github/workflows/understand-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "understand-dashboard"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (graph data)
        uses: actions/checkout@v4

      - name: Checkout Understand-Anything dashboard (pinned)
        uses: actions/checkout@v4
        with:
          repository: Lum1104/Understand-Anything
          ref: 5c1e35f90be029efb012a41e1122b08abef5cbb2
          path: .ua

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .ua/understand-anything-plugin/pnpm-lock.yaml

      - name: Install deps
        working-directory: .ua/understand-anything-plugin
        run: pnpm install --no-frozen-lockfile

      - name: Build core
        working-directory: .ua/understand-anything-plugin
        run: pnpm --filter @understand-anything/core build

      - name: Build static dashboard
        working-directory: .ua/understand-anything-plugin/packages/dashboard
        env:
          VITE_GRAPH_URL: ./knowledge-graph.json
          VITE_META_URL: ./meta.json
        run: npx vite build --config vite.config.demo.ts --base=./ --outDir dist --emptyOutDir

      - name: Inject knowledge graph
        run: |
          cp .understand-anything/knowledge-graph.json .ua/understand-anything-plugin/packages/dashboard/dist/knowledge-graph.json
          cp .understand-anything/meta.json .ua/understand-anything-plugin/packages/dashboard/dist/meta.json

      # Publish into gh-pages/understand/ ONLY. keep the rest of the branch
      # (the marketing prototype at root) untouched. Deploy runs on main only;
      # a workflow_dispatch on a feature branch validates install + build first.
      - name: Publish to gh-pages under /understand/
        if: github.ref == 'refs/heads/main'
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          DIST=.ua/understand-anything-plugin/packages/dashboard/dist
          git fetch origin gh-pages --depth=1
          git worktree add gh-pages-wt gh-pages
          # Replace only the /understand/ subtree; everything else at root is preserved.
          rm -rf gh-pages-wt/understand
          mkdir -p gh-pages-wt/understand
          cp -R "$DIST"/. gh-pages-wt/understand/
          cd gh-pages-wt
          git add understand
          if git diff --staged --quiet; then
            echo "No dashboard changes to publish."
          else
            git commit -m "ci: publish Understand dashboard at /understand/ (source ${GITHUB_SHA})"
            git push origin gh-pages
          fi
